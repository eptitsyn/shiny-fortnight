# MAGE dataset + Qwen3.5-2B PAWN features with Binoculars channels.
#
# `backbone` is the PAWN hidden-state source and the Binoculars performer.
# `binoculars_observer_backbone` supplies the second-token distribution used
# for cross-entropy. These two models must share an identical tokenizer.
#
# This writes 7 metric channels:
# [entropy, max_log_probs, next_token_log_probs, quantile, top_p,
#  binoculars_cross_entropy, binoculars_ratio]
# Existing 5-channel caches are not compatible; re-extract when using this.

dataset_name: yaful/MAGE

backbone: Qwen/Qwen3.5-2B
backbone_tag: qwen35_2b_bino

binoculars_observer_backbone: Qwen/Qwen3.5-2B-Base
binoculars_performer_backbone: ${data.backbone}

hidden_dim: 2048
max_len: 1024
min_len: 16

cache_dir: ${paths.cache_root}/${data.backbone_tag}
train_dir: ${data.cache_dir}/train
eval_dir:  ${data.cache_dir}/validation
test_dir:  ${data.cache_dir}/test

testbeds: null
train_filter: null
eval_filter: null
