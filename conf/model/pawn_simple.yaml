# Smaller PAWN variant based on the original base config: 128 features,
# 1 hidden layer, dropout 0.1, and 3 metrics instead of 5. Uses the same
# hybrid positional encoding as the larger default.

num_metrics: 3

# MLP shape
num_hidden_features: 128
num_hidden_layers: 1
gate_nn_num_layers: null     # null -> follow num_hidden_layers
num_gates: null              # null -> follow num_hidden_features
activation: gelu
norm_type: layer
residual: true

# Gate input composition
concat_consecutive_hidden_states: false
pos_encoding: hybrid         # normalized | fourier | learned | hybrid
pos_embed_dim: 16            # learned/hybrid absolute-position channels; fourier requires an even value
max_len: ${data.max_len}

# Gate context (neighbor mixing before gate MLP)
gate_context: none           # none | conv
gate_context_kernel: 9       # odd; only used when gate_context=conv
gate_context_layers: 1       # only used when gate_context=conv

# Aggregation
aggregation_method: attention   # attention | sigmoid | mean

# Metric-sequence DFT features. Computed in PAWN from cached metric channels,
# so toggling this does not require re-extraction.
dft_features: false
dft_num_bins: 8
dft_metric_indices: null        # null -> all metric channels
dft_log_scale: true
dft_eps: 1e-8
metrics_clip_value: null

# Regularization
dropout: 0.1
dropout_tokens: 0.0
