# Defaults from configs/experiment/mage/llm_metrics_mlp_gpt2.yaml in the
# original ai-gen-detection repo (paper config for MAGE / GPT-2).

num_metrics: 5

# MLP shape
num_hidden_features: 256
num_hidden_layers: 3
gate_nn_num_layers: null     # null -> follow num_hidden_layers
num_gates: null              # null -> follow num_hidden_features (one gate per feature)
activation: gelu
norm_type: layer
residual: true

# Gate input composition
concat_consecutive_hidden_states: true
pos_embed_dim: 0             # 0 -> fwd+rev normalized position only; >0 (even) -> add that many sinusoidal Fourier channels
max_len: ${data.max_len}

# Gate context (neighbor mixing before gate MLP)
gate_context: none           # none | conv
gate_context_kernel: 9       # odd; only used when gate_context=conv
gate_context_layers: 1       # only used when gate_context=conv

# Aggregation
aggregation_method: attention   # attention | sigmoid | mean

# Regularization
dropout: 0.0
dropout_tokens: 0.15
